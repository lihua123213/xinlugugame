<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李华的像素农场</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0503;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace;overflow:hidden}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;border:4px solid #3a1a08;box-shadow:0 0 80px rgba(0,0,0,0.8),0 0 0 3px #1a0804;border-radius:3px}
</style></head>
<body>
<canvas id="c" width="960" height="640" tabindex="0"></canvas>
<script>
// ═══════════════════════ CONFIG ═══════════════════════
const TS=32,MW=80,MH=35,CW=960,CH=640,PSPD=1.5,MAX_STAM=100,TCOST=2;
const T={GRASS:0,WATER:1,STONE:2,WOOD:3,PATH:4,SAND:5,BRIDGE:6};
const GC={spring:'#8cc850',summer:'#6aaa3a',fall:'#d4a040',winter:'#d8e8f4'};
const GC2={spring:'#7ab840',summer:'#5a9a2a',fall:'#c09030',winter:'#c8d8e4'};
const GC3={spring:'#9ad860',summer:'#7aba4a',fall:'#e0b050',winter:'#e8f4ff'};
const SNAME={spring:'春',summer:'夏',fall:'秋',winter:'冬'};
const SS=['spring','summer','fall','winter'];
const TOOLS=['hoe','watercan','axe','pickaxe','rod'];
const TNAMES={hoe:'锄头',watercan:'水壶',axe:'斧头',pickaxe:'镐',rod:'钓竿'};
const ITEMS={
  parsnip_seed:{n:'防风草种子',t:'seed',crop:'parsnip',ic:'🟤',pr:20,ss:['spring']},
  potato_seed:{n:'土豆种子',t:'seed',crop:'potato',ic:'🟡',pr:30,ss:['spring']},
  tomato_seed:{n:'番茄种子',t:'seed',crop:'tomato',ic:'🔴',pr:25,ss:['summer']},
  corn_seed:{n:'玉米种子',t:'seed',crop:'corn',ic:'🟨',pr:25,ss:['summer','fall']},
  wheat_seed:{n:'小麦种子',t:'seed',crop:'wheat',ic:'🟠',pr:15,ss:['summer','fall']},
  pumpkin_seed:{n:'南瓜种子',t:'seed',crop:'pumpkin',ic:'🎃',pr:40,ss:['fall']},
  parsnip:{n:'防风草',t:'crop',ic:'🤍',pr:50},potato:{n:'土豆',t:'crop',ic:'🥔',pr:70},
  tomato:{n:'番茄',t:'crop',ic:'🍅',pr:60},corn:{n:'玉米',t:'crop',ic:'🌽',pr:55},
  wheat:{n:'小麦',t:'crop',ic:'🌾',pr:40},pumpkin:{n:'南瓜',t:'crop',ic:'🎃',pr:100},
  wood:{n:'木材',t:'resource',ic:'🪵',pr:10},stone:{n:'石头',t:'resource',ic:'🪨',pr:10},
  ore:{n:'矿石',t:'resource',ic:'💎',pr:30},
  fish_carp:{n:'鲤鱼',t:'fish',ic:'🐟',pr:45},fish_bass:{n:'鲈鱼',t:'fish',ic:'🐠',pr:60},
  fish_trout:{n:'鳟鱼',t:'fish',ic:'🐡',pr:80},flower:{n:'野花',t:'gift',ic:'🌸',pr:0},
  hoe:{n:'锄头',t:'tool',ic:'🔧',pr:0},watercan:{n:'水壶',t:'tool',ic:'🚿',pr:0},
  axe:{n:'斧头',t:'tool',ic:'🪓',pr:0},pickaxe:{n:'镐',t:'tool',ic:'⛏',pr:0},rod:{n:'钓竿',t:'tool',ic:'🎣',pr:0},
  pink_gem:{n:'粉色宝石',t:'gem',ic:'💎',pr:999},iron_ore:{n:'铁矿石',t:'resource',ic:'⛓',pr:25},iron_armor:{n:'铁甲',t:'armor',ic:'🛡',pr:0},iron_sword:{n:'铁剑',t:'weapon',ic:'⚔',pr:0},
  meal:{n:'套餐',t:'food',ic:'🍱',pr:50,stam:40},soup:{n:'热汤',t:'food',ic:'🍜',pr:30,stam:25},bread:{n:'面包',t:'food',ic:'🍞',pr:15,stam:12}
};
const CROP_D={parsnip:{st:[2,2,2,2],rg:false,cl:'#f0e0a0'},potato:{st:[2,2,2,2],rg:false,cl:'#d4b060'},tomato:{st:[2,2,2,1],rg:true,cl:'#e84838',rd:2},corn:{st:[2,2,2,2],rg:true,cl:'#e8c838',rd:2},wheat:{st:[1,1,2,2],rg:false,cl:'#e0b840'},pumpkin:{st:[2,2,3,2],rg:false,cl:'#f08820'}};

// ═══════════════════════ UTILS ═══════════════════════
function dk(c,p){var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16),f=1-p;return'#'+[r,g,b].map(x=>Math.floor(x*f).toString(16).padStart(2,'0')).join('');}
function lt(c,p){var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16),f=1+p;return'#'+[r,g,b].map(x=>Math.min(255,Math.floor(x*f)).toString(16).padStart(2,'0')).join('');}
function mx(a,b,t){return a+(b-a)*t;}

// ═══════════════════════ INPUT ═══════════════════════
class Input{
  constructor(){
    var t=this;t.keys={};t._edge={};t.mx=0;t.my=0;t.clk=false;t.cx=0;t.cy=0;
    window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab','Escape'].includes(e.code))e.preventDefault();if(!t.keys[e.code])t._edge[e.code]=true;t.keys[e.code]=true;});
    window.addEventListener('keyup',e=>{t.keys[e.code]=false;});
    var c=document.getElementById('c');
    c.addEventListener('mousemove',e=>{var r=c.getBoundingClientRect();t.mx=e.clientX-r.left;t.my=e.clientY-r.top;});
    c.addEventListener('click',e=>{var r=c.getBoundingClientRect();t.clk=true;t.cx=e.clientX-r.left;t.cy=e.clientY-r.top;});
  }
  upd(){this._ep={...this._edge};this._edge={};}
  getClick(){var r=this.clk;this.clk=false;return r?{x:this.cx,y:this.cy}:null;}
  d(c){return!!this.keys[c];}
  edge(c){return!!this._ep[c];}
}

// ═══════════════════════ CAMERA ═══════════════════════
class Camera{constructor(){this.x=0;this.y=0;}follow(px,py,mw,mh){this.x=Math.max(0,Math.min(Math.floor(px-CW/2),mw*TS-CW));this.y=Math.max(0,Math.min(Math.floor(py-CH/2),mh*TS-CH));}}

// ═══════════════════════ TIME ═══════════════════════
class TimeSys{
  constructor(){this.season='spring';this.day=1;this.h=6;this.m=0;this.tick=0;}
  upd(){this.tick++;var tm=Math.floor((this.tick/36000)*20*60);this.h=(6+Math.floor(tm/60))%24;this.m=tm%60;}
  nextDay(){this.day++;if(this.day>2){this.day=1;this.season=SS[(SS.indexOf(this.season)+1)%4];}this.h=6;this.m=0;this.tick=0;}
  str(){return SNAME[this.season]+' 第'+this.day+'天 '+String(this.h).padStart(2,'0')+':'+String(this.m).padStart(2,'0');}
  prog(){var tm=(this.h<6?this.h+24:this.h)-6;return(tm*60+this.m)/(20*60);}
}

// ═══════════════════════ MAP ═══════════════════════
function genMap(){
  var M=Array.from({length:MH},()=>new Array(MW).fill(T.GRASS));
  for(var x=0;x<MW;x++){var y0=8+Math.sin(x*0.2)*3+Math.sin(x*0.45)*1.5;for(var dy=-1;dy<=1;dy++){var y=Math.round(y0)+dy;if(y>=0&&y<MH&&M[y][x]===T.GRASS)M[y][x]=T.WATER;}}
  for(x=0;x<MW;x++){var y0=30+Math.sin(x*0.18)*4+Math.cos(x*0.3)*2;for(dy=-1;dy<=1;dy++){var y=Math.round(y0)+dy;if(y>=0&&y<MH&&M[y][x]===T.GRASS)M[y][x]=T.WATER;}}
  for(var y=5;y<=9;y++)for(x=30;x<=34;x++)if(y<MH&&M[y][x]!==T.WATER)M[y][x]=T.WATER;
  for(y=0;y<5;y++)for(x=0;x<MW;x++)if(y<MH&&M[y][x]===T.GRASS&&Math.random()<0.55)M[y][x]=T.STONE;
  for(y=4;y<MH;y++)for(x=40;x<MW;x++)if(M[y][x]===T.GRASS&&Math.random()<0.4)M[y][x]='tree_'+(Math.random()<0.3?'pine':Math.random()<0.5?'oak':'fruit');
  for(y=4;y<MH;y++)for(x=0;x<40;x++)if(M[y][x]===T.GRASS&&Math.random()<0.05)M[y][x]='tree_'+(Math.random()<0.4?'pine':'oak');
  var path=function(x1,y1,x2,y2){var x=x1,y=y1;while(x!==x2||y!==y2){if(x>=0&&x<MW&&y>=0&&y<MH&&M[y][x]===T.GRASS)M[y][x]=T.PATH;if(x<x2)x++;else if(x>x2)x--;else if(y<y2)y++;else if(y>y2)y--;}};
  path(10,2,10,16);path(10,16,20,16);path(20,16,20,28);path(3,16,10,16);path(30,16,38,16);path(20,20,30,20);
  for(y=2;y<16;y++)if(y<MH&&M[y][10]===T.GRASS)M[y][10]=T.PATH;
  for(x=3;x<21;x++)if(16<MH&&M[16][x]===T.GRASS)M[16][x]=T.PATH;
  for(y=14;y<Math.min(32,MH);y++)for(x=2;x<9;x++)if(M[y][x]===T.GRASS)M[y][x]=T.SAND;
  for(y=6;y<18;y++)for(x=15;x<30;x++)if(y<MH&&M[y][x]&&typeof M[y][x]==='string'&&M[y][x].startsWith('tree_'))M[y][x]=T.GRASS;
  // Bridges
  for(y=7;y<=10;y++)for(x=9;x<=11;x++)if(y>=0&&y<MH&&x>=0&&x<MW&&M[y][x]===T.WATER)M[y][x]=T.BRIDGE;
  for(y=28;y<=34;y++)for(x=8;x<=12;x++)if(y>=0&&y<MH&&x>=0&&x<MW)M[y][x]=T.GRASS;
  for(y=30;y<=33;y++)for(x=8;x<=12;x++)if(y>=0&&y<MH&&x>=0&&x<MW)M[y][x]=T.BRIDGE;
  // Buildings
  M[1][5]='mine';M[3][8]='shop1';M[3][9]='shop2';M[4][8]='shop2';M[4][9]='shop2';
  M[1][35]='rest1';M[1][36]='rest2';M[2][35]='rest2';M[2][36]='rest2';
  M[9][14]='house1';M[9][15]='house2';M[10][14]='house2';M[10][15]='house2';
  // Bottom-right clearing + blacksmith
  for(var yb=18;yb<Math.min(30,MH);yb++)for(var xb=50;xb<65;xb++)if(yb<MH&&M[yb][xb]&&typeof M[yb][xb]==='string'&&M[yb][xb].startsWith('tree_'))M[yb][xb]=T.GRASS;
  M[20][52]='smithy1';M[20][53]='smithy2';M[21][52]='smithy2';M[21][53]='smithy2';M[20][55]='p2room1';M[20][56]='p2room2';M[21][55]='p2room2';M[21][56]='p2room2';
  // Flowers
  for(y=0;y<MH;y++)for(x=0;x<MW;x++)if(M[y][x]===T.GRASS&&Math.random()<0.08)M[y][x]='flower';
  for(y=0;y<MH;y++)for(x=0;x<MW;x++){if(M[y][x]===T.GRASS){var nw=false,np=false;for(var dy2=-1;dy2<=1;dy2++)for(var dx2=-1;dx2<=1;dx2++){var nx2=x+dx2,ny2=y+dy2;if(nx2>=0&&nx2<MW&&ny2>=0&&ny2<MH){if(M[ny2][nx2]===T.WATER)nw=true;if(M[ny2][nx2]===T.PATH)np=true;}}if((nw||np)&&Math.random()<0.2)M[y][x]='flower';}}
  return M;
}
function genDungeon(){
  var w=30,h=20,M=[];
  for(var y=0;y<h;y++){M[y]=[];for(var x=0;x<w;x++){
    if(y===0||y===h-1||x===0||x===w-1)M[y][x]=T.STONE;
    else if(Math.random()<0.08)M[y][x]=T.STONE;
    else if(Math.random()<0.03)M[y][x]=T.WATER;
    else M[y][x]=T.GRASS;
  }}
  M[1][Math.floor(w/2)]='dungeon_exit';
  M[2][Math.floor(w/2)]=T.GRASS;
  return M;
}
function isSolid(t){return t===T.WATER||t===T.STONE||(typeof t==='string'&&t.startsWith('tree_'))||t==='shop1'||t==='shop2'||t==='house1'||t==='house2'||t==='rest1'||t==='rest2'||t==='smithy1'||t==='smithy2'||t==='p2room1'||t==='p2room2'||t==='mine';}
function isDungeonSolid(t){return t===T.STONE||t===T.WATER;}

// ═══════════════════════ PARTICLES ═══════════════════════
class Particle{constructor(x,y,vx,vy,life,color,size){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=life;this.ml=life;this.color=color;this.size=size||2;}upd(){this.x+=this.vx;this.y+=this.vy;this.life--;}get a(){return Math.max(0,this.life/this.ml);}get dead(){return this.life<=0;}}
class ParticleSys{
  constructor(){this.p=[];this.w=[];this._smoke=0;}
  emit(x,y,count,color,life,size,speed){if(this.p.length>200)return;for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,s=(speed||2)*(0.5+Math.random());this.p.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,life||20,color,size));}}
  upd(season,prog){for(var i=this.p.length-1;i>=0;i--){this.p[i].upd();if(this.p[i].dead)this.p.splice(i,1);}
    if(season==='winter'&&this.w.length<80&&Math.random()<0.25)this.w.push(new Particle(Math.random()*CW,-5,0.2+Math.random()*0.3,0.8+Math.random()*1.2,500,'#f0f4ff',1.5+Math.random()*2));
    else if(season==='spring'&&this.w.length<80&&prog>0.3&&prog<0.7&&Math.random()<0.1)this.w.push(new Particle(Math.random()*CW,-5,0,1.5+Math.random()*2,250,'#88bbee',1));
    else if(season==='fall'&&this.w.length<80&&Math.random()<0.04)this.w.push(new Particle(Math.random()*CW,-5,0.3+Math.random()*0.5,0.2+Math.random()*0.3,350,'#e09030',2.5));
    for(i=this.w.length-1;i>=0;i--){this.w[i].upd();if(this.w[i].dead||this.w[i].y>CH)this.w.splice(i,1);}
    if(this._smoke>0){this._smoke--;if(Math.random()<0.3){var cam=game.cam,sx=14*TS+TS/2-cam.x,sy=9*TS+TS/2-cam.y;this.p.push(new Particle(sx+10,sy-30,-0.1+Math.random()*0.2,-0.5-Math.random()*0.5,60,'rgba(180,170,160,0.4)',3));}}}
  drw(ctx,cam){for(var i=0;i<this.p.length;i++){var p=this.p[i];ctx.globalAlpha=p.a;ctx.fillStyle=p.color;ctx.fillRect(Math.floor(p.x-cam.x),Math.floor(p.y-cam.y),p.size,p.size);}ctx.globalAlpha=1;}
  drwW(ctx){for(var i=0;i<this.w.length;i++){var p=this.w[i];ctx.globalAlpha=p.a*0.65;ctx.fillStyle=p.color;ctx.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);}ctx.globalAlpha=1;}
}

// ═══════════════════════ INVENTORY ═══════════════════════
class Inv{
  constructor(){this.slots=new Array(12).fill(null);this.gold=500;this.add('hoe',1);this.add('watercan',1);this.add('axe',1);this.add('pickaxe',1);this.add('rod',1);this.add('parsnip_seed',5);}
  add(k,c){c=c||1;for(var i=0;i<this.slots.length;i++){var s=this.slots[i];if(s&&s.key===k&&s.count<999){s.count+=c;return true;}}var idx=this.slots.findIndex(function(s){return!s;});if(idx>=0){this.slots[idx]={key:k,count:c};return true;}return false;}
  rem(k,c){c=c||1;for(var i=0;i<this.slots.length;i++){var s=this.slots[i];if(s&&s.key===k){s.count-=c;if(s.count<=0)this.slots[i]=null;return true;}}return false;}
  cnt(k){var c=0;for(var i=0;i<this.slots.length;i++){var s=this.slots[i];if(s&&s.key===k)c+=s.count;}return c;}has(k){return this.cnt(k)>0;}
}

// ═══════════════════════ CROP MANAGER ═══════════════════════
class CropMgr{
  constructor(){this.d=Array.from({length:MH},()=>new Array(MW).fill(null));}
  till(tx,ty){if(!this.d[ty])this.d[ty]=new Array(MW).fill(null);if(!this.d[ty][tx])this.d[ty][tx]={tilled:false,watered:false};this.d[ty][tx].tilled=true;}
  water(tx,ty){var d=this.d[ty]?.[tx];if(d&&d.tilled)d.watered=true;}
  plant(tx,ty,ct){var d=this.d[ty]?.[tx];if(!d||!d.tilled||d.cropType)return false;d.cropType=ct;d.stage=0;d.ds=0;return true;}
  dailyUpd(){for(var y=0;y<MH;y++)for(var x=0;x<MW;x++){var d=this.d[y]?.[x];if(!d||!d.tilled)continue;
    if(d.cropType){var sd=ITEMS[d.cropType+'_seed'];if(sd&&!sd.ss.includes(game.time.season)){d.cropType=null;d.stage=0;d.ds=0;continue;}}
    if(d.cropType&&d.watered){d.ds++;var cd=CROP_D[d.cropType];if(d.ds>=cd.st[d.stage]){d.ds=0;if(d.stage<cd.st.length-1)d.stage++;}}d.watered=false;}}
  harvest(tx,ty){var d=this.d[ty]?.[tx];if(!d||!d.cropType)return null;var cd=CROP_D[d.cropType];if(d.stage>=cd.st.length-1){var c=d.cropType;if(cd.rg){d.stage=cd.st.length-2;d.ds=0;}else{d.cropType=null;d.stage=0;d.ds=0;}return c;}return null;}
  draw(ctx,tx,ty,cx,cy){var d=this.d[ty]?.[tx];if(!d||!d.tilled)return;var sx=tx*TS-cx,sy=ty*TS-cy;
    ctx.fillStyle=d.watered?'#4a2010':'#5e3818';ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
    ctx.fillStyle=d.watered?'#3a1508':'#4e2810';for(var i=0;i<5;i++)ctx.fillRect(sx+4,sy+5+i*5,TS-8,1);
    if(d.cropType)this._drawCrop(ctx,sx,sy,d.cropType,d.stage,d.watered);}
  _drawCrop(ctx,sx,sy,tp,stage,watered){var cd=CROP_D[tp],total=cd.st.length,cx=sx+TS/2,baseY=sy+TS-6;
    if(stage===0){ctx.fillStyle='#5a9a30';ctx.fillRect(cx-1,baseY-6,2,6);ctx.fillStyle='#6aaa40';ctx.fillRect(cx-2,baseY-8,5,3);}
    else if(stage===total-1){ctx.fillStyle='#3a7018';ctx.fillRect(cx-5,baseY-10,10,10);ctx.fillStyle='#4a8a20';ctx.fillRect(cx-4,baseY-9,8,9);ctx.fillStyle=cd.cl;ctx.fillRect(cx-4,baseY-16,8,8);}
    else{var h=5+(stage/(total-1))*10;ctx.fillStyle='#5a9a30';ctx.fillRect(cx-1,baseY-h,2,h);ctx.fillStyle='#6aaa40';ctx.fillRect(cx-3,baseY-h-2,6,4);}}}

// ═══════════════════════ PLAYER ═══════════════════════
class Player{
  constructor(){this.x=19*TS+TS/2;this.y=10*TS+TS/2;this.w=18;this.h=24;this.dir='down';this.mv=false;this.af=0;this.at=0;this.ti=0;this.ut=false;this.tt=0;this.stam=MAX_STAM;this.hp=100;this.seed=null;}
  get tx(){return Math.floor(this.x/TS);}
  get ty(){return Math.floor(this.y/TS);}
  get ft(){var d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[this.dir];return{x:this.tx+d[0],y:this.ty+d[1]};}
  upd(input,map){
    if(game.state!=='playing')return;
    var dx=0,dy=0;if(input.d('KeyW'))dy=-1;if(input.d('KeyS'))dy=1;if(input.d('KeyA'))dx=-1;if(input.d('KeyD'))dx=1;
    this.mv=false;
    if(dx!==0||dy!==0){if(dx&&dy){dx*=0.707;dy*=0.707;}this.mv=true;this.dir=Math.abs(dx)>=Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');
      var nx=this.x+dx*PSPD,ny=this.y+dy*PSPD;if(!this._col(nx,ny,map)){this.x=nx;this.y=ny;this.at++;if(this.at>=7){this.at=0;this.af=(this.af+1)%4;}}}
    else{this.af=0;this.at=0;}
    if(this.ut){this.tt--;if(this.tt<=0)this.ut=false;}
    if(this.stam<MAX_STAM&&!this.mv&&Math.random()<0.002)this.stam+=0.5;}
  _col(nx,ny,map){var hw=this.w/2,hh=this.h/2;for(var _i=0;_i<4;_i++){var _px=[nx-hw,nx+hw-1,nx-hw,nx+hw-1][_i],_py=[ny-hh,ny-hh,ny+hh-1,ny+hh-1][_i];var tx=Math.floor(_px/TS),ty=Math.floor(_py/TS);if(tx<0||ty<0||tx>=MW||ty>=MH)return true;if(isSolid(map[ty]?.[tx]))return true;}return false;}
  draw(ctx,cam){var sx=Math.floor(this.x-cam.x),sy=Math.floor(this.y-cam.y);this._spr(ctx,sx,sy,this.dir,this.af,this.mv);}
  _spr(ctx,cx,cy,dir,frame,mv){

class FishGame{
  constructor(){this.ac=false;this.by=150;this.fy=150;this.prog=0;this.mprog=120;this.w=120;this.bh=24;this.ah=280;this.cau=null;this.pow=80;}

  upd(input){if(!this.ac)return null;this._ft+=(Math.random()-0.5)*4;this._ft=Math.max(10,Math.min(this.ah-10,this._ft));
    this.fy+=(this._ft-this.fy)*0.05+(Math.random()-0.5)*1.5;
    if(input.d('KeyW')||input.d('ArrowUp'))this.by-=3.5;if(input.d('KeyS')||input.d('ArrowDown'))this.by+=3.5;
    this.by=Math.max(0,Math.min(this.ah-this.bh,this.by));
    this.prog+=this.fy>=this.by&&this.fy<=this.by+this.bh?1.3:-0.7;if(this.prog<0)this.prog=0;
    this.pow-=0.15;if(this.pow<=0){this.ac=false;return'fail';}
    if(this.prog>=this.mprog){var fs=['fish_carp','fish_carp','fish_bass','fish_bass','fish_trout'];this.cau=fs[Math.floor(Math.random()*fs.length)];this.ac=false;return'caught';}return null;}

    ctx.fillStyle='rgba(255,255,255,0.05)';for(var i=0;i<10;i++)ctx.fillRect(lx+15+i*32,ly+8+(game.time.tick+i*9)%(this.ah-8),28,1);
    var fy=ly+10+this.fy;ctx.fillStyle='#ff6644';ctx.fillRect(lx+this.w+24,fy,16,8);ctx.fillStyle='#fff';ctx.fillRect(lx+this.w+30,fy+2,2.5,2.5);
    ctx.fillStyle='rgba(40,220,100,0.5)';ctx.fillRect(lx+14,ly+10+this.by,this.w,this.bh);ctx.strokeStyle='#40ff80';ctx.lineWidth=2;ctx.strokeRect(lx+14,ly+10+this.by,this.w,this.bh);ctx.lineWidth=1;
    var pw=220;ctx.fillStyle='#1a1a1a';ctx.fillRect(CW/2-pw/2,ly+this.ah+35,pw,12);ctx.strokeStyle='#555';ctx.strokeRect(CW/2-pw/2,ly+this.ah+35,pw,12);
    var pg=ctx.createLinearGradient(CW/2-pw/2,0,CW/2+pw/2,0);pg.addColorStop(0,'#0a8030');pg.addColorStop(1,'#40ff60');ctx.fillStyle=pg;ctx.fillRect(CW/2-pw/2,ly+this.ah+35,pw*(this.prog/this.mprog),12);
    ctx.fillStyle='#ffcc00';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('⚡ '+Math.ceil(this.pow),CW/2,ly+this.ah+65);ctx.fillStyle='#ddd';ctx.fillText('W/S 控制绿色捕捉框',CW/2,ly-10);}
}

  static load(){var r=localStorage.getItem('farm_save');if(!r)return false;try{var d=JSON.parse(r);game.pl.x=d.pl.x;game.pl.y=d.pl.y;game.pl.stam=d.pl.stam;game.pl.ti=d.pl.ti;game.pl.hp=d.pl.hp||100;game.time.season=d.time.season;game.time.day=d.time.day;game.time.h=d.time.h;game.time.m=d.time.m;game.time.tick=d.time.tick;game.inv.slots=d.inv.slots;game.inv.gold=d.inv.gold;game.cm.d=d.crops;game.map=d.map;d.npcs.forEach(function(n,i){if(game.npcs[i])game.npcs[i].fs=n.fs;});game.gemCollected=d.gemCollected||false;game.zone=d.zone||'farm';game.dungeonWave=d.dungeonWave||1;if(game.zone==='dungeon'){game.dungeon=genDungeon();game.dungeonZombies=[];game.pl.x=15*TS+TS/2;game.pl.y=18*TS+TS/2;}return true;}catch(e){return false;}}

// ═══════════════════════ AUDIO ═══════════════════════
class AudioMgr{
  constructor(){this.ctx=null;}
  init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)();}
  play(f,d,tp,vol){tp=tp||'square';vol=vol||0.07;if(!this.ctx)return;var o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(vol,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);}
  sfx(a){var s={till:[180,0.1],water:[350,0.12],plant:[480,0.08,'triangle'],harvest:[600,0.1,'triangle'],chop:[140,0.15,'sawtooth'],pick:[280,0.12,'sawtooth'],fish:[650,0.15,'triangle'],buy:[780,0.1,'triangle'],sell:[850,0.08,'triangle'],err:[90,0.2,'sawtooth',0.04],day:[420,0.15,'triangle'],night:[200,0.25],npc:[600,0.15,'triangle']};if(s[a]){var f=s[a][0],d=s[a][1],t=s[a][2]||'square',v=s[a][3]||0.07;this.play(f,d,t,v);}}}

// ═══════════════════════ SHOP ═══════════════════════
class Shop{
  constructor(){this.stock=['parsnip_seed','potato_seed','tomato_seed','corn_seed','wheat_seed','pumpkin_seed'];}
  avail(){return this.stock.filter(function(s){return ITEMS[s].ss.includes(game.time.season);});}
  sellable(){var r=[];for(var i=0;i<game.inv.slots.length;i++){var s=game.inv.slots[i];if(!s)continue;var d=ITEMS[s.key];if(d&&(d.t==='crop'||d.t==='fish'||d.t==='resource'))r.push(s);}return r;}
  buy(k){if(game.inv.gold>=ITEMS[k].pr){if(game.inv.add(k,1)){game.inv.gold-=ITEMS[k].pr;return true;}}return false;}
  sell(k){if(game.inv.rem(k,1)){game.inv.gold+=ITEMS[k].pr;return true;}return false;}
}

    this.zombies=[];this.gemCollected=false;this.zone='farm';

    this.farmRX=0;this.farmRY=0;this.dungeonWave=1;this._pendingDungeon=false;this._p2Input={};this.p2=new P2Player();this._mapDirty=false;this._cropDirty=false;
  }

      if(e.code==='Tab'){e.preventDefault();}
      if(e.code==='F5'){e.preventDefault();Save.save();t.svTimer=90;t.aud.sfx('buy');}

  _mineUpd(){

        var _tx=Math.floor(_px/TS),_ty=Math.floor(_py/TS);if(_tx<0||_ty<0||_tx>=30||_ty>=20||isDungeonSolid(map[_ty]?.[_tx])){blocked=true;break;}}
